appId: com.tanzaniatours.ntsdesktopsync
productName: NTS Desktop Sync

directories:
  output: dist
  buildResources: build

files:
  - dist/**/*
  - package.json

win:
  target:
    - nsis
  icon: build/logo-white.ico
  artifactName: 'NTS Desktop Sync Setup ${version}.exe'

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# --------------------------------------------------
# 🔄 AUTO UPDATE – GitHub Releases
# --------------------------------------------------
publish:
  provider: github
  owner: LeaTTNO
  repo: nts-desktop-sync
