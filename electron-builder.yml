appId: com.tanzaniatours.nts
productName: NTS Travel Program Builder

directories:
  output: dist
  buildResources: build

files:
  - dist/**/*
  - src/main/**/*
  - package.json

win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: 'NTS-Setup.exe'

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# --------------------------------------------------
# 🔄 AUTO UPDATE – GitHub Releases
# --------------------------------------------------
publish:
  provider: github
  owner: LeaTTNO
  repo: nts-desktop-sync
