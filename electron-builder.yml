appId: com.tanzaniatours.ntsdesktopsync
productName: NTS Desktop Sync

directories:
  output: dist
  buildResources: build

files:
  - dist/main/**/*
  - dist/renderer/**/*
  - package.json
  - "!dist/*.exe"
  - "!dist/*.exe.blockmap"
  - "!dist/win-unpacked"
  - "!dist/*.yml"
  - "!dist/*.yaml"
  - "!dist/*.7z"

# Unpack PowerShell scripts and JavaScript from asar (they must be readable by powershell.exe and node)
# KRITISK: Uten dette vil PowerShell-scriptene ikke fungere i production!
asarUnpack:
  - "dist/main/*.ps1"
  - "dist/main/ppt-dg-dto.js"
  - "dist/main/electron-main.js"
  - "dist/main/preload.js"
  - "dist/main/logo-white.ico"

win:
  target:
    - nsis
  icon: build/logo-white.ico
  artifactName: 'NTS-Desktop-Sync-Setup-${version}.exe'

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# --------------------------------------------------
# 🔄 AUTO UPDATE – GitHub Releases
# --------------------------------------------------
publish:
  provider: github
  owner: LeaTTNO
  repo: nts-desktop-sync
